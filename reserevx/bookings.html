<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings - Reserevx</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo"><div class="logo-icon">R</div>Reserevx</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="bus.html">Bus</a></li>
        <li><a href="flight.html">Flights</a></li>
        <li><a href="train.html">Trains</a></li>
        <li><a href="movie.html">Movies</a></li>
        <li><a href="hotel.html">Hotels</a></li>
        <li><a href="event.html">Events</a></li>
      </ul>
      <div class="nav-actions">
        <a href="bookings.html" class="btn btn-primary btn-sm">My Bookings</a>
        <button class="menu-toggle" aria-label="Menu">☰</button>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>📋 My Bookings</h1>
      <p>View and manage all your bookings</p>
    </div>
  </div>

  <div class="container">
    <div id="bookings-list" class="bookings-grid"></div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom"><p>&copy; 2026 Reserevx. All rights reserved.</p></div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', renderBookings);

    function renderBookings() {
      const container = document.getElementById('bookings-list');
      const bookings = getBookings();

      if (bookings.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <h3>No bookings yet</h3>
            <p>Start booking bus, flight, train, movie tickets and more!</p>
            <a href="index.html" class="btn btn-primary" style="margin-top:20px">Explore Services</a>
          </div>
        `;
        return;
      }

      container.innerHTML = bookings.map(booking => {
        const info = CATEGORY_INFO[booking.category] || { icon: '🎫', color: 'icon-bus' };
        const date = new Date(booking.bookedAt).toLocaleDateString('en-IN', {
          day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        return `
          <div class="booking-card">
            <div class="booking-type-icon ${info.color}">${info.icon}</div>
            <div class="booking-details">
              <h3>${booking.name}</h3>
              <p>${booking.operator} ${booking.from ? '• ' + booking.from : ''}${booking.to ? ' → ' + booking.to : ''}</p>
              <p>🕐 ${booking.departure} • ${booking.passengers} passenger(s) • ${formatPrice(booking.totalPrice)}</p>
              <p class="booking-id">Booking ID: ${booking.id} • Booked on ${date}</p>
            </div>
            <div>
              <span class="badge badge-success">${booking.status}</span>
              <button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="cancelBooking('${booking.id}')">Cancel</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function cancelBooking(id) {
      if (!confirm('Are you sure you want to cancel this booking?')) return;

      let bookings = getBookings();
      bookings = bookings.filter(b => b.id !== id);
      localStorage.setItem('reserevx_bookings', JSON.stringify(bookings));
      showToast('Booking cancelled successfully', 'success');
      renderBookings();
      updateBookingCount();
    }
  </script>
</body>
</html>
